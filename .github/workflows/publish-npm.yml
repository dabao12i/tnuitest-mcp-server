name: Publish to npm

on:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - id: package-version
        run: echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Check release tag match
        id: version-check
        run: |
          TAG='${{ github.event.release.tag_name }}'
          VERSION='${{ steps.package-version.outputs.version }}'
          if [ "$TAG" = "$VERSION" ] || [ "$TAG" = "v$VERSION" ]; then
            echo "matched=true" >> "$GITHUB_OUTPUT"
            echo "Release tag $TAG matches package.json version $VERSION; proceeding to publish."
          else
            echo "matched=false" >> "$GITHUB_OUTPUT"
            echo "Skipping npm publish: release tag $TAG does not match package.json version $VERSION."
          fi

      - run: npm publish --access public
        if: steps.version-check.outputs.matched == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
